type: '@webframp/ddd-guidance'
typeVersion: 2026.06.25.3
id: bbe2c9c6-ae1a-4e4b-91cc-fed4e5db858a
name: restic-backup-ddd
version: 1
tags: {}
globalArguments:
  projectContext: |
    @atalanta/restic-backup: a swamp MODEL extension (type
    @atalanta/restic-backup/repository) that wraps the restic backup tool to
    create encrypted, deduplicated snapshots of a swamp repo's .swamp/ runtime
    evidence (data outputs, workflow runs, execution outputs, evaluated
    definitions, reports). Git protects swamp definitions; restic protects the
    runtime evidence swamp writes under .swamp/. Explicitly NOT a custom
    datastore, NOT multi-writer coordination, NOT live team safety. The model
    represents one restic backup configuration for a swamp repo and exposes
    typed methods (check_restic, init, backup, snapshots, check, restore,
    forget, prune) over the restic binary, mapping restic JSON output into
    structured swamp resources.
  teamSize: solo
methods: {}
