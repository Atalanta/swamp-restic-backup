type: '@swamp/software-factory'
typeVersion: 2026.06.24.1
id: d3918b03-9ca3-4cd4-a7b8-c51311d510a8
name: restic-backup-factory
version: 1
tags: {}
globalArguments:
  stages:
    - id: architecture
      initial: true
      description: Establish the design/approach for the work item.
      work:
        mode: interactive
        skills: [swamp]
        systemPrompt: |
          You are designing @atalanta/restic-backup: a swamp MODEL extension
          (type @atalanta/restic-backup/repository) that durably backs up a
          swamp repo's on-disk .swamp/ runtime evidence using restic.

          GROUND YOUR DESIGN IN THE DDD OUTPUT — do not re-derive the domain.
          Read the recorded domain model first:
            swamp data get restic-backup-ddd map --version 1        # contextMap
            swamp data get restic-backup-ddd glossary --version 1   # domainGlossary
          And mine swamp facts from the local KB rather than guessing:
            cd /Users/stephen.nelsonsmith/Developer/swamp-kb
            swamp data query 'modelName == "swamp-internals" && specName == "entry"
              && attributes.id in ["concept-datastore","concept-data",
              "concept-extension","concept-method","decision-source-runtime-split"]'
              --select '{"id": attributes.id, "summary": attributes.summary,
              "claims": attributes.claims}' --json

          Hold these invariants (from the DDD glossary), they are NOT optional:
          - Purpose is DURABILITY ("don't lose data"), scoped to the default
            post-`repo init`, on-disk .swamp/ filesystem datastore.
          - This is a THIN ADAPTER over restic (a generic subdomain), NOT an
            anticorruption layer. restic owns all backend/storage concepts.
          - The one piece of real domain logic is the include/exclude/secret
            POLICY: capture runtime evidence (.swamp/data, outputs,
            workflow-runs, definitions-evaluated, workflows-evaluated); EXCLUDE
            derived caches (_catalog.db is self-healing — never restore stale;
            bundle caches, telemetry, logs).
          - The restic CREDENTIAL is resolved at runtime from an env var /
            vault and is NEVER persisted in YAML, swamp data, or the backed-up
            tree (mirrors swamp's secrets-never-in-.swamp invariant).
          - RESTORE is staged: requires an explicit targetDir, refuses to
            clobber a live .swamp/ without confirm.

          Produce the `architecture` artifact: the design decisions, the method
          surface and their typed output resources, the include/exclude policy,
          the secret-handling approach, and the open risks. Map restic JSON
          output into structured swamp resources; one method per purpose; do
          NOT add a "run arbitrary restic command" method.
      artifacts:
        - name: architecture
          schema:
            type: object
            required: [overview, modelType, methods, includeExcludePolicy, secretHandling, restoreSafety, risks]
            additionalProperties: false
            properties:
              overview:
                type: string
                description: One-paragraph design summary grounded in the DDD context.
              modelType:
                type: string
                description: The swamp model type id, e.g. @atalanta/restic-backup/repository.
              methods:
                type: array
                minItems: 1
                description: The method surface; one method per purpose.
                items:
                  type: object
                  required: [name, purpose, outputResource]
                  additionalProperties: false
                  properties:
                    name: { type: string }
                    purpose: { type: string }
                    outputResource:
                      type: string
                      description: The structured swamp resource this method emits.
              includeExcludePolicy:
                type: object
                required: [include, exclude, rationale]
                additionalProperties: false
                properties:
                  include: { type: array, items: { type: string }, minItems: 1 }
                  exclude: { type: array, items: { type: string }, minItems: 1 }
                  rationale:
                    type: string
                    description: Why evidence is captured and derived caches/secrets excluded.
              secretHandling:
                type: string
                description: How the restic credential is resolved at runtime and kept out of YAML, data, and the backed-up tree.
              restoreSafety:
                type: string
                description: The staged-restore design (explicit targetDir, refuse to clobber live .swamp/ without confirm).
              risks:
                type: array
                items: { type: string }
                description: Open design risks and questions.
      transitions:
        - name: submit
          to: planning
          gates:
            - type: artifact-exists
              config: { artifact: architecture }

    - id: planning
      description: Produce an implementation plan from the architecture.
      work:
        mode: interactive
        skills: [swamp]
        systemPrompt: |
          Produce an implementation plan from the approved `architecture`
          artifact. Read it first:
            swamp data get restic-backup-factory artifact-<workItem>-architecture --json

          The plan must be an ordered list of concrete, individually testable
          steps to build the @atalanta/restic-backup model extension as a swamp
          TypeScript extension (export const model in extensions/models/*.ts),
          plus the tests that prove each step. Honour the architecture's
          include/exclude policy, secret-handling and staged-restore decisions
          exactly — do not relitigate the design here.

          Cover at minimum: extension scaffolding and manifest; the model type
          and globalArguments; each method (check_restic, init, backup,
          snapshots, check, restore, forget, prune) wired to restic's JSON
          output modes; mapping restic JSON into the typed output resources;
          and the test coverage from the proposal (missing-binary structured
          result, default include/exclude correctness, password never emitted,
          backup-result shape, snapshots JSON parsing, restore refuses unsafe
          target, forget dry-run does not prune). Pin any npm deps explicitly.
      artifacts:
        - name: plan
          schema:
            type: object
            required: [summary, steps, testStrategy]
            additionalProperties: false
            properties:
              summary:
                type: string
                description: One-paragraph plan overview.
              steps:
                type: array
                minItems: 1
                description: Ordered, individually verifiable implementation steps.
                items:
                  type: object
                  required: [id, description, verifiedBy]
                  additionalProperties: false
                  properties:
                    id: { type: string }
                    description: { type: string }
                    verifiedBy:
                      type: string
                      description: The test or check that proves this step is done.
              testStrategy:
                type: string
                description: How the suite is structured (temp local restic repo first; remote backends env-gated and optional).
      transitions:
        - name: submit
          to: plan-review
          gates:
            - type: artifact-exists
              config: { artifact: plan }

    - id: plan-review
      description: >
        Independent adversarial review of the plan. The driver runs the
        external-review-findings workflow (artifact: plan-review), then records the
        returned findings via resolve_findings before advancing.
      work:
        mode: dispatch
        skills: [swamp]
        systemPrompt: |
          Findings for this stage come from the INDEPENDENT external reviewer
          (codex) via the @atalanta/external-reviewer/external-review-findings
          workflow — not from this context. The reviewer reads the `plan` and
          `architecture` artifacts from swamp and returns findings JSON.

          Reviewer brief: adversarially review the plan for the restic-backup
          model extension. Flag as critical/high anything that violates the
          recorded domain invariants — backing up derived caches (_catalog.db,
          bundles); the restic credential reaching YAML/data/the backed-up
          tree; a restore that can clobber a live .swamp/ without confirm;
          scraping restic human output where JSON exists; or a "run arbitrary
          restic command" method. Also flag steps with no verifiedBy test.
          The driver records the returned findings via resolve_findings, then
          the findings-clear gate (blocking: critical, high) must pass.
      artifacts:
        - name: plan-review
          kind: findings
          reviews: plan
      transitions:
        - name: approve
          to: implementing
          gates:
            - type: artifact-fresh
              config: { artifact: plan-review, recordedThisCycle: true }
            - type: findings-clear
              config: { artifact: plan-review, blocking: [critical, high] }
            - type: human-approval
              config: { id: plan-review-approval }
        - name: rework
          to: planning

    - id: implementing
      description: Implement the work item per the approved plan.
      work:
        mode: interactive
        skills: [swamp]
        systemPrompt: |
          Implement the approved `plan` for the @atalanta/restic-backup model
          extension. Read the plan and architecture artifacts first:
            swamp data get restic-backup-factory artifact-<workItem>-plan --json
            swamp data get restic-backup-factory artifact-<workItem>-architecture --json

          Build the extension under extensions/models/ following the swamp
          extension guide. Honour every domain invariant: curated
          include/exclude policy; credential never persisted to YAML, data, or
          the backup tree; staged restore. Use restic JSON output modes and map
          them into the typed resources; one method per purpose. Write the tests
          the plan specified.

          Do the work on a dedicated git branch. Record a `change-summary`
          artifact (what changed and why) and a `change-request` evidence entry
          carrying the branch name (and PR url if one exists).
      artifacts:
        - name: change-summary
          schema:
            type: object
            required: [summary]
            properties:
              summary: { type: string }
      evidence:
        - name: change-request
          schema:
            type: object
            required: [branch]
            properties:
              branch: { type: string, minLength: 1 }
              url: { type: string }
      transitions:
        - name: submit
          to: testing
          gates:
            - type: evidence-recorded
              config: { name: change-request }

    - id: testing
      description: Run the project's build/test suite; gate on a clean result.
      work:
        mode: workflow
        # Repo-local command/shell model (restic-backup-tests) wrapped in the
        # restic-backup-test-suite workflow; execute throws on non-zero exit, so
        # a failing suite fails the run and the workflow-succeeded gate stays shut.
        workflow:
          name: restic-backup-test-suite
          inputs:
            ref: '${{ data.latest(self.name, "evidence-change-request").payload.branch }}'
        resultEvidence: test-run
      transitions:
        - name: pass
          to: code-review
          gates:
            - type: workflow-succeeded
              config: { workflow: restic-backup-test-suite }
        - name: fail
          to: implementing
          gates:
            - type: evidence-recorded
              config: { name: test-run, requireField: { status: failed } }

    - id: code-review
      description: >
        Independent adversarial review of the implementation. The driver runs the
        external-review-findings workflow (artifact: code-review), then records the
        returned findings via resolve_findings before advancing.
      work:
        mode: dispatch
        skills: [swamp]
        systemPrompt: |
          Findings for this stage come from the INDEPENDENT external reviewer
          (codex) via the @atalanta/external-reviewer/external-review-findings
          workflow — not from this context. The reviewer reads the
          `change-summary` artifact and the implementation diff from swamp/git
          and returns findings JSON.

          Reviewer brief: adversarially review the implementation of the
          restic-backup model extension. Verify against the domain invariants
          and the proposal's test list. Flag as critical/high: the restic
          password appearing in any output, log, model YAML, or the backed-up
          tree; derived caches (_catalog.db, bundles) included in the default
          backup set; restore that can overwrite a live .swamp/ without
          confirm; scraping restic human output where JSON exists; a generic
          "run arbitrary restic command" method; or missing/!passing tests for
          missing-binary, default include/exclude, password redaction,
          backup-result shape, snapshots parsing, restore safety, forget
          dry-run. The driver records findings via resolve_findings; the
          findings-clear gate (blocking: critical, high) must pass.
      artifacts:
        - name: code-review
          kind: findings
          reviews: change-summary
      transitions:
        - name: accept
          to: done
          gates:
            - type: artifact-fresh
              config: { artifact: code-review, recordedThisCycle: true }
            - type: findings-clear
              config: { artifact: code-review, blocking: [critical, high] }
            - type: human-approval
              config: { id: code-review-approval }
        - name: rework
          to: implementing

    - id: done
      terminal: true

    - id: aborted
      terminal: true

  globalTransitions:
    - name: abort
      to: aborted
      gates:
        - type: human-approval
          config: { id: abort-confirmation }
methods: {}
