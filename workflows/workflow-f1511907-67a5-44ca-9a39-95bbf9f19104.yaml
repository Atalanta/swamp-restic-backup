id: f1511907-67a5-44ca-9a39-95bbf9f19104
name: restic-backup-test-suite
description: >
  Build/test gate for the restic-backup factory. Checks out the implementation
  branch and runs the extension test suite via the restic-backup-tests
  command/shell model. The execute method throws on a non-zero exit code, so a
  failing suite fails the workflow run and the factory's workflow-succeeded gate
  stays closed.
tags: {}
inputs:
  type: object
  properties:
    ref:
      type: string
      description: Git branch/ref carrying the implementation to test.
  required: [ref]
jobs:
  - name: main
    description: Run the extension test suite on the implementation branch.
    steps:
      - name: run-tests
        description: Check out the branch and run the test suite.
        task:
          type: model_method
          modelIdOrName: restic-backup-tests
          methodName: execute
          inputs:
            run: |
              set -euo pipefail
              git checkout "${{ inputs.ref }}"
              npm ci
              npm test
            workingDir: .
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn: []
    weight: 0
version: 1
